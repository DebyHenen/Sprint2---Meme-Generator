<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body onload="onInit()">
    <header>
        <h1>Meme Generator</h1>
        <nav class="main-nav">
            <a href="#">Gallery</a>
            <a href="#">About</a>
        </nav>
    </header>
    <section class="section-gallery">
        <div class="images"></div>
    </section>

    <section class="section-editor hidden">
        <div class="main-editor">
            <div class="canvas-container">
                <canvas class="canvas-editor" width="500" height="500"></canvas>
            </div>
            <div class="controls-editor">
                <input type="text" class="txt-input" placeholder="Add Text Here" oninput="onTxtChange(event)">
                <div class="actions">
                    <a class="btn-download" href="#" onclick="onDownloadMeme(this)" download="file-name">Download</a>

                </div>

            </div>


        </div>
    </section>
    <script src="js/main.js"></script>
    <script src="js/gallery.service.js"></script>
    <script src="js/meme.service.js"></script>
    <script src="js/gallery.controller.js"></script>
    <script src="js/meme.controller.js"></script>

</body>

</html>
